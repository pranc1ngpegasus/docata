name: rust
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'rust-toolchain.toml'
      - '.clippy.toml'
      - '.rustfmt.toml'
permissions:
  contents: read
jobs:
  fmt:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@19effe9fe722874e6d46dd7182e4b8b7a43c4a99 # v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command cargo fmt --all --check
  clippy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@19effe9fe722874e6d46dd7182e4b8b7a43c4a99 # v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command cargo clippy --workspace -- -D warnings
  test:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@19effe9fe722874e6d46dd7182e4b8b7a43c4a99 # v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command cargo test --workspace
